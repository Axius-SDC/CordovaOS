<style>
    .tier-1 td:first-child { border-left: 4px solid #dc3545; }
    .tier-2 td:first-child { border-left: 4px solid #fd7e14; }
    .tier-3 td:first-child { border-left: 4px solid #ffc107; }
    .tier-4 td:first-child { border-left: 4px solid #0dcaf0; }
</style>
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <span class="fw-semibold">
            <i class="bi bi-table me-1"></i>{{ row_count }} result{{ row_count|pluralize }} in {{ elapsed }}s
        </span>
    </div>
    <div class="card-body p-0" style="max-height: 500px; overflow-y: auto;">
        {% if rows %}
        <table class="table table-striped table-hover mb-0">
            <thead class="table-dark" style="position: sticky; top: 0; z-index: 1;">
                <tr>
                    {% for var in variables %}
                    <th>{{ var }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr class="{% if '1 -' in row.0 %}tier-1{% elif '2 -' in row.0 %}tier-2{% elif '3 -' in row.0 %}tier-3{% elif '4 -' in row.0 %}tier-4{% endif %}">
                    {% for cell in row %}
                    <td class="text-truncate" style="max-width: 300px;" title="{{ cell }}">{{ cell }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="p-4 text-center text-muted">No results returned.</div>
        {% endif %}
    </div>
</div>
